<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>天气预报</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(180deg, #e8f0fe 0%, #f0f7ff 50%, #ffffff 100%);
            min-height: 100vh;
            padding: 24px;
            color: #202124;
        }
        .container { max-width: 1400px; margin: 0 auto; }

        .search-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        .city-select {
            padding: 12px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 15px;
            font-family: inherit;
            background: white;
            cursor: pointer;
            outline: none;
            transition: all 0.3s ease;
            min-width: 200px;
        }
        .city-select:focus {
            border-color: #4285F4;
            box-shadow: 0 0 0 3px rgba(66,133,244,0.2);
        }
        .search-input-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .search-input {
            padding: 12px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 15px;
            font-family: inherit;
            outline: none;
            transition: all 0.3s ease;
            width: 240px;
        }
        .search-input:focus {
            border-color: #4285F4;
            box-shadow: 0 0 0 3px rgba(66,133,244,0.2);
        }
        .search-btn {
            padding: 12px 24px;
            background: linear-gradient(135deg, #4285F4, #34A853);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .search-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(66,133,244,0.4);
        }
        .datetime-info {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 20px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            font-size: 14px;
            color: #5f6368;
            animation: fadeIn 0.5s ease-out;
        }
        .datetime-info .time {
            font-size: 20px;
            font-weight: 700;
            color: #1a73e8;
            font-variant-numeric: tabular-nums;
        }
        .datetime-info .date {
            font-weight: 500;
            color: #202124;
        }
        .datetime-info .lunar {
            padding: 4px 12px;
            background: linear-gradient(135deg, #4285F4, #34A853);
            color: white;
            border-radius: 16px;
            font-size: 12px;
            font-weight: 500;
        }
        .datetime-info .weekday {
            padding: 4px 10px;
            background: #e8f0fe;
            color: #1a73e8;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
        }

        .loading {
            text-align: center;
            padding: 60px;
            font-size: 18px;
            color: #5f6368;
        }
        .loading .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid #e0e0e0;
            border-top-color: #4285F4;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .animate-fade-in { animation: fadeInUp 0.6s ease-out; }
        .animate-slide-in { animation: slideIn 0.5s ease-out; }
        .animate-scale { animation: scaleIn 0.4s ease-out; }

        .current {
            border-radius: 24px;
            padding: 32px;
            margin-bottom: 32px;
            box-shadow: 0 2px 8px rgba(66,133,244,0.15), 0 8px 24px rgba(66,133,244,0.1);
            background: linear-gradient(135deg, #4285F4 0%, #34A853 50%, #FBBC05 100%);
            color: white;
            animation: fadeInUp 0.6s ease-out;
        }
        .current-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }
        .city-name { font-size: 32px; font-weight: 700; }
        .lunar-info { font-size: 15px; opacity: 0.95; margin-top: 6px; }
        .current-icon {
            font-size: 72px;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.2));
            animation: pulse 2s ease-in-out infinite;
        }
        .current-main {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 16px;
            margin-bottom: 24px;
        }
        .main-item {
            text-align: center;
            padding: 20px 16px;
            background: rgba(255,255,255,0.2);
            border-radius: 16px;
            backdrop-filter: blur(8px);
            transition: transform 0.3s ease;
            animation: fadeIn 0.6s ease-out;
        }
        .main-item:nth-child(1) { animation-delay: 0.1s; }
        .main-item:nth-child(2) { animation-delay: 0.2s; }
        .main-item:nth-child(3) { animation-delay: 0.3s; }
        .main-item:hover { transform: scale(1.05); }
        .main-label { font-size: 13px; opacity: 0.9; margin-bottom: 6px; font-weight: 500; }
        .main-value { font-size: 36px; font-weight: 700; }
        .main-sub { font-size: 13px; opacity: 0.9; margin-top: 6px; }
        .current-tips {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .current-tip {
            padding: 10px 20px;
            border-radius: 24px;
            font-size: 14px;
            font-weight: 500;
            background: rgba(255,255,255,0.25);
            backdrop-filter: blur(4px);
            transition: transform 0.2s ease;
        }
        .current-tip:hover { transform: scale(1.05); }

        .forecast-title {
            color: #1a73e8;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 20px;
            animation: slideIn 0.5s ease-out;
        }
        .forecast-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 14px;
        }
        .day-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(66,133,244,0.1), 0 4px 16px rgba(0,0,0,0.06);
            transition: all 0.3s ease;
            border: 1px solid rgba(66,133,244,0.1);
            animation: fadeInUp 0.5s ease-out;
        }
        .day-card:nth-child(1) { animation-delay: 0.1s; }
        .day-card:nth-child(2) { animation-delay: 0.15s; }
        .day-card:nth-child(3) { animation-delay: 0.2s; }
        .day-card:nth-child(4) { animation-delay: 0.25s; }
        .day-card:nth-child(5) { animation-delay: 0.3s; }
        .day-card:nth-child(6) { animation-delay: 0.35s; }
        .day-card:nth-child(7) { animation-delay: 0.4s; }
        .day-card:hover {
            transform: translateY(-6px) scale(1.02);
            box-shadow: 0 8px 24px rgba(66,133,244,0.2), 0 12px 32px rgba(0,0,0,0.1);
        }
        .day-header {
            padding: 18px 12px;
            text-align: center;
            background: linear-gradient(135deg, #4285F4 0%, #34A853 50%, #FBBC05 100%);
            color: white;
        }
        .day-date { font-size: 13px; font-weight: 500; margin-bottom: 4px; }
        .day-lunar {
            font-size: 12px;
            margin-bottom: 6px;
            background: rgba(255,255,255,0.25);
            display: inline-block;
            padding: 2px 10px;
            border-radius: 12px;
        }
        .day-term {
            display: inline-block;
            padding: 3px 10px;
            background: rgba(255,255,255,0.3);
            border-radius: 12px;
            font-size: 11px;
            margin-bottom: 10px;
            font-weight: 500;
        }
        .day-icon { font-size: 44px; margin-bottom: 12px; }
        .day-desc { font-size: 14px; font-weight: 500; }
        .day-body { padding: 14px 12px; }
        .day-temp {
            text-align: center;
            font-size: 18px;
            font-weight: 700;
            color: #1a73e8;
            margin-bottom: 12px;
        }
        .day-info { margin-bottom: 12px; }
        .info-item {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid #f1f3f4;
            transition: background 0.2s ease;
        }
        .info-item:hover { background: #f8f9fa; }
        .info-item:last-child { border-bottom: none; }
        .info-label { color: #5f6368; font-size: 12px; }
        .info-value { color: #202124; font-size: 12px; font-weight: 500; }
        .day-tips { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; }
        .tip-item {
            padding: 5px 10px;
            border-radius: 16px;
            font-size: 11px;
            font-weight: 500;
            transition: transform 0.2s ease;
        }
        .tip-item:hover { transform: scale(1.1); }

        .news-section {
            margin-top: 40px;
            animation: fadeInUp 0.6s ease-out;
        }
        .news-title {
            color: #1a73e8;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .news-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }
        .news-panel {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(66,133,244,0.1), 0 4px 16px rgba(0,0,0,0.06);
            border: 1px solid rgba(66,133,244,0.1);
        }
        .news-panel-header {
            padding: 16px 20px;
            background: linear-gradient(135deg, #4285F4, #34A853);
            color: white;
            font-size: 18px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .news-list {
            padding: 12px 0;
            max-height: 600px;
            overflow-y: auto;
        }
        .news-item {
            padding: 12px 20px;
            border-bottom: 1px solid #f1f3f4;
            transition: all 0.2s ease;
            cursor: pointer;
            animation: fadeIn 0.4s ease-out;
        }
        .news-item:hover {
            background: #f8f9fa;
            padding-left: 24px;
        }
        .news-item:last-child { border-bottom: none; }
        .news-item-title {
            font-size: 14px;
            font-weight: 500;
            color: #202124;
            line-height: 1.5;
            margin-bottom: 4px;
        }
        .news-item-time {
            font-size: 12px;
            color: #5f6368;
        }
        .news-loading {
            padding: 40px;
            text-align: center;
            color: #5f6368;
        }
        .news-loading .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid #e0e0e0;
            border-top-color: #4285F4;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 12px;
        }
        .news-list::-webkit-scrollbar { width: 6px; }
        .news-list::-webkit-scrollbar-track { background: #f1f3f4; border-radius: 3px; }
        .news-list::-webkit-scrollbar-thumb { background: #dadce0; border-radius: 3px; }
        .news-list::-webkit-scrollbar-thumb:hover { background: #bdc1c6; }

        @media (max-width: 1200px) {
            .forecast-grid { grid-template-columns: repeat(4, 1fr); }
            .news-grid { grid-template-columns: 1fr; }
        }
        @media (max-width: 768px) {
            .current-main { grid-template-columns: 1fr; }
            .forecast-grid { grid-template-columns: repeat(2, 1fr); }
            .search-bar { flex-direction: column; align-items: stretch; }
            .search-input { width: 100%; }
            .news-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="search-bar">
            <div class="datetime-info" id="datetimeInfo"></div>
            <select class="city-select" id="citySelect" onchange="loadWeather(this.value)">
                <option value="上海">上海</option>
                <option value="江都">江都</option>
                <option value="张家港">张家港</option>
            </select>
            <div class="search-input-group">
                <input type="text" class="search-input" id="searchInput" placeholder="输入城市名称..." onkeypress="if(event.key==='Enter')searchCity()">
                <button class="search-btn" onclick="searchCity()">🔍 搜索</button>
            </div>
        </div>

        <div id="weatherContent">
            <div class="loading">
                <div class="spinner"></div>
                正在获取天气数据...
            </div>
        </div>

        <div class="news-section">
            <div class="news-title">📰 今日新闻</div>
            <div class="news-grid">
                <div class="news-panel">
                    <div class="news-panel-header">🇨🇳 国内新闻</div>
                    <div class="news-list" id="cnNews">
                        <div class="news-loading"><div class="spinner"></div>加载中...</div>
                    </div>
                </div>
                <div class="news-panel">
                    <div class="news-panel-header">🌍 国际新闻</div>
                    <div class="news-list" id="worldNews">
                        <div class="news-loading"><div class="spinner"></div>加载中...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const WEATHER_ICONS = {
            0:"☀️",1:"🌤️",2:"⛅",3:"☁️",45:"🌫️",48:"🌫️",
            51:"🌦️",53:"🌦️",55:"🌧️",56:"🌨️",57:"🌨️",
            61:"🌧️",63:"🌧️",65:"🌧️",66:"🌨️",67:"🌨️",
            71:"🌨️",73:"🌨️",75:"❄️",77:"❄️",
            80:"🌧️",81:"🌧️",82:"🌧️",85:"🌨️",86:"❄️",
            95:"⛈️",96:"⛈️",99:"⛈️"
        };
        const WEATHER_DESC = {
            0:"晴",1:"大部晴",2:"多云",3:"阴天",45:"雾",48:"雾凇",
            51:"小毛毛雨",53:"毛毛雨",55:"大毛毛雨",56:"冻毛毛雨",57:"冻雨",
            61:"小雨",63:"中雨",65:"大雨",66:"冻雨",67:"大冻雨",
            71:"小雪",73:"中雪",75:"大雪",77:"雪粒",
            80:"小阵雨",81:"中阵雨",82:"大阵雨",85:"小阵雪",86:"大阵雪",
            95:"雷暴",96:"雷暴冰雹",99:"强雷暴冰雹"
        };

        const LUNAR_MONTHS = ["正月","二月","三月","四月","五月","六月","七月","八月","九月","十月","冬月","腊月"];
        const LUNAR_DAYS = ["初一","初二","初三","初四","初五","初六","初七","初八","初九","初十",
            "十一","十二","十三","十四","十五","十六","十七","十八","十九","二十",
            "廿一","廿二","廿三","廿四","廿五","廿六","廿七","廿八","廿九","三十"];

        function getLunarDate(dateStr) {
            const solarTerms = {
                "0105":"小寒","0120":"大寒","0203":"立春","0218":"雨水",
                "0305":"惊蛰","0320":"春分","0404":"清明","0420":"谷雨",
                "0505":"立夏","0521":"小满","0605":"芒种","0621":"夏至",
                "0707":"小暑","0722":"大暑","0807":"立秋","0823":"处暑",
                "0907":"白露","0923":"秋分","1008":"寒露","1023":"霜降",
                "1107":"立冬","1122":"小雪","1207":"大雪","1222":"冬至"
            };
            const termEmojis = {
                "小寒":"❄️","大寒":"❄️","立春":"🌱","雨水":"🌧️",
                "惊蛰":"🐛","春分":"🌸","清明":"🌿","谷雨":"🌾",
                "立夏":"☀️","小满":"🌾","芒种":"🌾","夏至":"🌞",
                "小暑":"🔥","大暑":"🔥","立秋":"🍂","处暑":"🍃",
                "白露":"💧","秋分":"🍁","寒露":"💧","霜降":"🌫️",
                "立冬":"❄️","小雪":"🌨️","大雪":"❄️","冬至":"🥟"
            };
            const d = new Date(dateStr);
            const month = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            const key = month + day;
            const term = solarTerms[key];
            return term ? { name: term, emoji: termEmojis[term] || "📅", display: `${termEmojis[term]||"📅"} ${term}` } : null;
        }

        function getWindLevel(speed) {
            if (speed < 6) return "软风";
            if (speed < 12) return "轻风";
            if (speed < 20) return "微风";
            if (speed < 29) return "和风";
            if (speed < 39) return "清风";
            if (speed < 50) return "强风";
            return "大风+";
        }

        function getClothing(temp, isRainy) {
            if (isRainy) return "🌂 带雨具";
            if (temp > 35) return "👕 短袖+防晒";
            if (temp > 30) return "👕 轻薄透气";
            if (temp > 25) return "👔 短袖/薄长袖";
            if (temp > 20) return "🧥 薄外套";
            if (temp > 15) return "🧥 外套/卫衣";
            if (temp > 10) return "🧥 厚外套";
            return "🧥 羽绒服";
        }

        function getUmbrella(prob, code) {
            const rainCodes = [51,53,55,56,57,61,63,65,66,67,80,81,82,95,96,99];
            if (rainCodes.includes(code) || prob > 50) return ["☂️ 必带","#e74c3c","#fff"];
            if (prob > 30) return ["🌂 备伞","#f39c12","#fff"];
            return ["☔ 不需要","#27ae60","#fff"];
        }

        function getLaundry(temp, hum, prob, code) {
            const rainCodes = [51,53,55,56,57,61,63,65,66,67,80,81,82,95,96,99];
            if (rainCodes.includes(code) || prob > 50) return ["🚫 不适合晾晒","#e74c3c","#fff"];
            if (hum > 80) return ["⚠️ 晾晒一般","#f39c12","#fff"];
            if (temp > 15 && hum < 70) return ["✅ 适合晾晒","#27ae60","#fff"];
            return ["⚠️ 晾晒一般","#f39c12","#fff"];
        }

        function getUV(uv) {
            if (uv <= 2) return ["弱","#27ae60"];
            if (uv <= 5) return ["中","#f39c12"];
            if (uv <= 7) return ["强","#e67e22"];
            if (uv <= 10) return ["很强","#e74c3c"];
            return ["极强","#8e44ad"];
        }

        const windDirs = ["北","东北","东","东南","南","西南","西","西北"];
        function getWindDir(deg) {
            return windDirs[Math.round(deg / 45) % 8] + "风";
        }

        async function loadWeather(city) {
            const content = document.getElementById('weatherContent');
            content.innerHTML = '<div class="loading"><div class="spinner"></div>正在获取天气数据...</div>';

            try {
                const geoResp = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1&language=zh`);
                const geoData = await geoResp.json();
                if (!geoData.results || geoData.results.length === 0) {
                    content.innerHTML = '<div class="loading">未找到该城市</div>';
                    return;
                }
                const geo = geoData.results[0];
                const cityName = `${geo.name} ${geo.country || ''}`.trim();

                const weatherResp = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${geo.latitude}&longitude=${geo.longitude}&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m,wind_direction_10m,uv_index&daily=temperature_2m_max,temperature_2m_min,weather_code,precipitation_probability_max,precipitation_sum,wind_speed_10m_max,uv_index_max,relative_humidity_2m_max&timezone=auto&forecast_days=7`);
                const data = await weatherResp.json();

                const cur = data.current;
                const code = cur.weather_code;
                const icon = WEATHER_ICONS[code] || "🌤️";
                const desc = WEATHER_DESC[code] || "未知";
                const uvText = getUV(cur.uv_index);
                const rainCodes = [51,53,55,56,57,61,63,65,66,67,80,81,82,95,96,99];
                const umbrella = getUmbrella(0, code);
                const clothing = getClothing(cur.temperature_2m, rainCodes.includes(code));
                const laundry = getLaundry(cur.temperature_2m, cur.relative_humidity_2m, 0, code);

                let dailyHTML = '';
                const weekdays = ["周日","周一","周二","周三","周四","周五","周六"];
                for (let i = 0; i < data.daily.time.length; i++) {
                    const d = new Date(data.daily.time[i]);
                    const weekday = weekdays[d.getDay()];
                    const term = getLunarDate(data.daily.time[i]);
                    const termHTML = term ? `<div class="day-term">${term.display}</div>` : '';
                    const dayCode = data.daily.weather_code[i];
                    const dayIcon = WEATHER_ICONS[dayCode] || "🌤️";
                    const dayDesc = WEATHER_DESC[dayCode] || "未知";
                    const avgTemp = (data.daily.temperature_2m_max[i] + data.daily.temperature_2m_min[i]) / 2;
                    const uvDay = getUV(data.daily.uv_index_max[i]);
                    const umbDay = getUmbrella(data.daily.precipitation_probability_max[i], dayCode);
                    const lauDay = getLaundry(avgTemp, data.daily.relative_humidity_2m_max[i], data.daily.precipitation_probability_max[i], dayCode);
                    const clothDay = getClothing(avgTemp, rainCodes.includes(dayCode));

                    dailyHTML += `
                    <div class="day-card">
                        <div class="day-header">
                            <div class="day-date">${data.daily.time[i]} ${weekday}</div>
                            ${termHTML}
                            <div class="day-icon">${dayIcon}</div>
                            <div class="day-desc">${dayDesc}</div>
                        </div>
                        <div class="day-body">
                            <div class="day-temp">${data.daily.temperature_2m_min[i]}°C ~ ${data.daily.temperature_2m_max[i]}°C</div>
                            <div class="day-info">
                                <div class="info-item"><span class="info-label">💧 湿度</span><span class="info-value">${data.daily.relative_humidity_2m_max[i]}%</span></div>
                                <div class="info-item"><span class="info-label">💨 风速</span><span class="info-value">${data.daily.wind_speed_10m_max[i]} km/h ${getWindLevel(data.daily.wind_speed_10m_max[i])}</span></div>
                                <div class="info-item"><span class="info-label">☀️ 紫外线</span><span class="info-value" style="color:${uvDay[1]};font-weight:bold">${uvDay[0]}</span></div>
                                <div class="info-item"><span class="info-label">🌧️ 降雨</span><span class="info-value">${data.daily.precipitation_probability_max[i]}% · ${data.daily.precipitation_sum[i]}mm</span></div>
                            </div>
                            <div class="day-tips">
                                <div class="tip-item" style="background:${umbDay[1]};color:${umbDay[2]}">${umbDay[0]}</div>
                                <div class="tip-item" style="background:${lauDay[1]};color:${lauDay[2]}">${lauDay[0]}</div>
                                <div class="tip-item" style="background:#4285F4;color:#fff">${clothDay}</div>
                            </div>
                        </div>
                    </div>`;
                }

                const weekdays2 = ["周一","周二","周三","周四","周五","周六","周日"];
                const today = new Date();
                const weekday2 = weekdays2[(today.getDay() + 6) % 7];

                content.innerHTML = `
                <div class="current">
                    <div class="current-header">
                        <div>
                            <div class="city-name">📍 ${cityName}</div>
                            <div class="lunar-info">📅 ${weekday2}</div>
                        </div>
                        <div class="current-icon">${icon}</div>
                    </div>
                    <div class="current-main">
                        <div class="main-item">
                            <div class="main-label">🌡️ 温度</div>
                            <div class="main-value">${Math.round(cur.temperature_2m)}°C</div>
                            <div class="main-sub">体感 ${Math.round(cur.apparent_temperature)}°C</div>
                        </div>
                        <div class="main-item">
                            <div class="main-label">💧 湿度</div>
                            <div class="main-value">${cur.relative_humidity_2m}%</div>
                        </div>
                        <div class="main-item">
                            <div class="main-label">💨 风速</div>
                            <div class="main-value">${cur.wind_speed_10m} km/h</div>
                            <div class="main-sub">${getWindDir(cur.wind_direction_10m)} · ${getWindLevel(cur.wind_speed_10m)}</div>
                        </div>
                    </div>
                    <div class="current-tips">
                        <div class="current-tip">☀️ 紫外线: ${uvText[0]}</div>
                        <div class="current-tip">${umbrella[0]}</div>
                        <div class="current-tip">${clothing}</div>
                        <div class="current-tip">${laundry[0]}</div>
                    </div>
                </div>
                <div class="forecast-title">📅 未来7天天气预报</div>
                <div class="forecast-grid">${dailyHTML}</div>`;
            } catch (err) {
                content.innerHTML = `<div class="loading">获取天气失败: ${err.message}</div>`;
            }
        }

        function searchCity() {
            const input = document.getElementById('searchInput');
            const city = input.value.trim();
            if (city) {
                document.getElementById('citySelect').value = '';
                loadWeather(city);
            }
        }

        function updateDateTime() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            const weekdays = ["星期日","星期一","星期二","星期三","星期四","星期五","星期六"];
            const weekday = weekdays[now.getDay()];
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');

            const lunarMonths = ["正月","二月","三月","四月","五月","六月","七月","八月","九月","十月","冬月","腊月"];
            const lunarDays = ["初一","初二","初三","初四","初五","初六","初七","初八","初九","初十",
                "十一","十二","十三","十四","十五","十六","十七","十八","十九","二十",
                "廿一","廿二","廿三","廿四","廿五","廿六","廿七","廿八","廿九","三十"];
            const solarTerms = {
                "0105":"小寒","0120":"大寒","0203":"立春","0218":"雨水",
                "0305":"惊蛰","0320":"春分","0404":"清明","0420":"谷雨",
                "0505":"立夏","0521":"小满","0605":"芒种","0621":"夏至",
                "0707":"小暑","0722":"大暑","0807":"立秋","0823":"处暑",
                "0907":"白露","0923":"秋分","1008":"寒露","1023":"霜降",
                "1107":"立冬","1122":"小雪","1207":"大雪","1222":"冬至"
            };
            const termEmojis = {
                "小寒":"❄️","大寒":"❄️","立春":"🌱","雨水":"🌧️",
                "惊蛰":"🐛","春分":"🌸","清明":"🌿","谷雨":"🌾",
                "立夏":"☀️","小满":"🌾","芒种":"🌾","夏至":"🌞",
                "小暑":"🔥","大暑":"🔥","立秋":"🍂","处暑":"🍃",
                "白露":"💧","秋分":"🍁","寒露":"💧","霜降":"🌫️",
                "立冬":"❄️","小雪":"🌨️","大雪":"❄️","冬至":"🥟"
            };

            const key = month + day;
            const term = solarTerms[key];
            let lunarText = "农历";
            if (term) {
                lunarText = `${termEmojis[term]} ${term}`;
            } else {
                const lunarMonth = lunarMonths[(now.getMonth() + 2) % 12];
                const lunarDay = lunarDays[(now.getDate() - 1) % 30];
                lunarText = `${lunarMonth}${lunarDay}`;
            }

            const el = document.getElementById('datetimeInfo');
            if (el) {
                el.innerHTML = `
                    <span class="time">${hours}:${minutes}:${seconds}</span>
                    <span class="weekday">${weekday}</span>
                    <span class="date">${year}-${month}-${day}</span>
                    <span class="lunar">${lunarText}</span>
                `;
            }
        }

        setInterval(updateDateTime, 1000);
        updateDateTime();
        loadWeather('上海');
        loadNews();

        async function loadNews() {
            const cnNewsEl = document.getElementById('cnNews');
            const worldNewsEl = document.getElementById('worldNews');

            const cnFeeds = [
                'https://rsshub.app/zaobao/realtime/china',
                'https://rsshub.app/thepaper/featured',
                'https://rsshub.app/sina/rollnews'
            ];
            const worldFeeds = [
                'https://rsshub.app/bbc/zhongwen',
                'https://rsshub.app/reuters/world',
                'https://rsshub.app/nyt/world'
            ];

            async function fetchRSS(url) {
                try {
                    const resp = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(url)}`);
                    const data = await resp.json();
                    if (data.status === 'ok' && data.items) {
                        return data.items.map(item => ({
                            title: item.title,
                            link: item.link,
                            time: item.pubDate
                        }));
                    }
                } catch(e) {}
                return [];
            }

            async function fetchRSSDirect(url) {
                try {
                    const resp = await fetch(url);
                    const text = await resp.text();
                    const parser = new DOMParser();
                    const xml = parser.parseFromString(text, 'text/xml');
                    const items = xml.querySelectorAll('item');
                    const results = [];
                    items.forEach((item, i) => {
                        if (i >= 20) return;
                        const title = item.querySelector('title')?.textContent || '';
                        const link = item.querySelector('link')?.textContent || '';
                        const pubDate = item.querySelector('pubDate')?.textContent || '';
                        if (title) results.push({ title, link, time: pubDate });
                    });
                    return results;
                } catch(e) { return []; }
            }

            async function loadNewsPanel(feeds, container) {
                let allNews = [];
                for (const feed of feeds) {
                    let items = await fetchRSS(feed);
                    if (items.length === 0) {
                        items = await fetchRSSDirect(feed);
                    }
                    allNews = allNews.concat(items);
                }

                const seen = new Set();
                allNews = allNews.filter(n => {
                    if (seen.has(n.title)) return false;
                    seen.add(n.title);
                    return true;
                }).slice(0, 20);

                if (allNews.length === 0) {
                    container.innerHTML = '<div class="news-loading">暂无新闻</div>';
                    return;
                }

                container.innerHTML = allNews.map((news, i) => {
                    const time = news.time ? new Date(news.time).toLocaleString('zh-CN', {month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'}) : '';
                    return `<div class="news-item" style="animation-delay:${i*0.05}s" onclick="window.open('${news.link}','_blank')">
                        <div class="news-item-title">${news.title}</div>
                        ${time ? `<div class="news-item-time">🕐 ${time}</div>` : ''}
                    </div>`;
                }).join('');
            }

            loadNewsPanel(cnFeeds, cnNewsEl);
            loadNewsPanel(worldFeeds, worldNewsEl);
        }
    </script>
