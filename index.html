    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {

            background: linear-gradient(180deg, #e8f0fe 0%, #f0f7ff 50%, #ffffff 100%);

            padding: 16px;
            color: #202124;
        }
        .container { max-width: 1600px; margin: 0 auto; }
        .main-layout { display: grid; grid-template-columns: 1fr 1fr 300px; gap: 16px; }
        .col { display: flex; flex-direction: column; gap: 16px; }
        .news-panel { background: white; border-radius: 14px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.06); border: 1px solid rgba(0,0,0,0.04); }
        .news-header { padding: 12px 16px; background: linear-gradient(135deg, #4285F4, #34A853); color: white; font-size: 15px; font-weight: 700; display: flex; justify-content: space-between; align-items: center; }
        .news-header.sports { background: linear-gradient(135deg, #1a73e8, #4285F4); }
        .news-header.tech { background: linear-gradient(135deg, #ea4335, #fbbc05); }
        .news-header.hot { background: linear-gradient(135deg, #34a853, #0d652d); }
        .more-btn { color: white; font-size: 12px; text-decoration: none; opacity: 0.9; }
        .more-btn:hover { opacity: 1; }
        .news-list { padding: 4px 0; max-height: 520px; overflow-y: auto; }
        .news-item { padding: 8px 14px; border-bottom: 1px solid #f1f3f4; transition: all 0.15s ease; cursor: pointer; }
        .news-item:hover { background: #f8f9fa; padding-left: 18px; }
        .news-item:last-child { border-bottom: none; }
        .news-item-title { font-size: 13px; font-weight: 500; color: #202124; line-height: 1.5; }
        .news-item-time { font-size: 11px; color: #999; margin-top: 2px; }
        .news-list::-webkit-scrollbar { width: 4px; }
        .news-list::-webkit-scrollbar-track { background: transparent; }
        .news-list::-webkit-scrollbar-thumb { background: #dadce0; border-radius: 2px; }

        .right-panel { display: flex; flex-direction: column; gap: 14px; }
        .datetime-card { background: white; border-radius: 14px; padding: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); border: 1px solid rgba(0,0,0,0.04); }
        .dt-time { font-size: 30px; font-weight: 700; color: #1a73e8; text-align: center; font-variant-numeric: tabular-nums; }
        .dt-date { text-align: center; color: #5f6368; font-size: 13px; margin-top: 4px; }
        .dt-row { display: flex; gap: 6px; margin-top: 8px; justify-content: center; flex-wrap: wrap; }
        .dt-tag { padding: 3px 10px; border-radius: 10px; font-size: 11px; font-weight: 500; }
        .dt-weekday { background: #e8f0fe; color: #1a73e8; }
        .dt-lunar { background: linear-gradient(135deg, #4285F4, #34A853); color: white; }

        .search-card { background: white; border-radius: 14px; padding: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); border: 1px solid rgba(0,0,0,0.04); }
        .search-row { display: flex; gap: 6px; }
        .city-select { flex: 1; padding: 8px 10px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 13px; font-family: inherit; background: white; cursor: pointer; outline: none; }
        .city-select:focus { border-color: #4285F4; }
        .search-input { flex: 1; padding: 8px 10px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 13px; font-family: inherit; outline: none; }
        .search-input:focus { border-color: #4285F4; }
        .search-btn { padding: 8px 14px; background: linear-gradient(135deg, #4285F4, #34A853); color: white; border: none; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; }

        .weather-card { background: white; border-radius: 14px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.06); border: 1px solid rgba(0,0,0,0.04); }
        .weather-header { padding: 10px 14px; background: linear-gradient(135deg, #4285F4, #34A853); color: white; font-size: 14px; font-weight: 700; }
        .weather-body { padding: 14px; }
        .wc-city { font-size: 16px; font-weight: 700; color: #202124; margin-bottom: 6px; text-align: center; }
        .wc-main { display: flex; align-items: center; gap: 14px; margin-bottom: 10px; justify-content: center; }
        .wc-icon { font-size: 56px; animation: pulse 2s ease-in-out infinite; }
        @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        .wc-temp { font-size: 36px; font-weight: 700; color: #1a73e8; }
        .wc-desc { font-size: 13px; color: #5f6368; }

        .wc-info-item { padding: 6px; background: #f8f9fa; border-radius: 8px; text-align: center; }
        .wc-info-label { font-size: 10px; color: #999; }
        .wc-info-value { font-size: 13px; font-weight: 600; color: #202124; }
        .wc-tips { display: flex; gap: 4px; flex-wrap: wrap; }
        .wc-tip { padding: 4px 8px; border-radius: 10px; font-size: 10px; font-weight: 500; }

        .forecast-title { font-size: 13px; font-weight: 700; color: #1a73e8; margin-bottom: 8px; }
        .forecast-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; }

        .day-icon { font-size: 22px; margin: 2px 0; }
        .day-temp { font-size: 10px; font-weight: 700; color: #202124; }

        .cal-nav { display: flex; justify-content: space-between; margin-bottom: 8px; }
        .cal-nav button { background: #e8f0fe; border: none; padding: 4px 10px; border-radius: 6px; cursor: pointer; font-size: 12px; color: #1a73e8; }
        .cal-nav button:hover { background: #d2e3fc; }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; text-align: center; }
        .cal-week { font-size: 10px; color: #999; padding: 4px 0; font-weight: 500; }
        .cal-day { font-size: 11px; padding: 4px; border-radius: 6px; cursor: pointer; transition: all 0.2s; }

        .cal-day.today { background: #1a73e8; color: white; font-weight: 700; }
        .cal-day.has-news { background: #34a853; color: white; font-weight: 500; }

        .cal-day.empty { cursor: default; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        @media (max-width: 1100px) {
            .main-layout { grid-template-columns: 1fr 1fr; }
            .right-panel { grid-column: 1 / -1; flex-direction: row; flex-wrap: wrap; }
            .right-panel > * { flex: 1; min-width: 260px; }
        }
        @media (max-width: 700px) {
            .main-layout { grid-template-columns: 1fr; }
            .right-panel { flex-direction: column; }
            .right-panel > * { min-width: auto; }
            .wc-icon { font-size: 64px; }
            .wc-temp { font-size: 40px; }
            .news-list { max-height: 200px; }
        }
    </style>

                </div>
                <div class="weather-card">

                    </div>
                </div>
                <div class="calendar-card">
                    <div class="cal-header">📅 新闻日历</div>
                    <div class="cal-nav">
                        <button onclick="changeMonth(-1)">◀ 上月</button>
                        <span id="calMonth" style="font-size:13px;font-weight:600"></span>
                        <button onclick="changeMonth(1)">下月 ▶</button>
                    </div>
                    <div class="cal-grid" id="calGrid"></div>
                </div>
            </div>
        </div>
    </div>

        const NEWS_DATES = ["2026-06-29"];

        const WI = {0:"☀️",1:"🌤️",2:"⛅",3:"☁️",45:"🌫️",48:"🌫️",51:"🌦️",53:"🌦️",55:"🌧️",61:"🌧️",63:"🌧️",65:"🌧️",71:"🌨️",73:"🌨️",75:"❄️",80:"🌧️",81:"🌧️",82:"🌧️",95:"⛈️",96:"⛈️",99:"⛈️"};
        const WD = {0:"晴",1:"大部晴",2:"多云",3:"阴天",45:"雾",51:"小毛毛雨",53:"毛毛雨",55:"大毛毛雨",61:"小雨",63:"中雨",65:"大雨",71:"小雪",73:"中雪",75:"大雪",80:"小阵雨",81:"中阵雨",82:"大阵雨",95:"雷暴",96:"雷暴冰雹",99:"强雷暴冰雹"};
        const wDirs=["北","东北","东","东南","南","西南","西","西北"];
        function gDir(d){ return wDirs[Math.round(d/45)%8]+"风"; }
        function gWL(s){ if(s<6)return"软风";if(s<12)return"轻风";if(s<20)return"微风";if(s<29)return"和风";return"清风"; }
        function gUV(u){ if(u<=2)return["弱","#27ae60"];if(u<=5)return["中","#f39c12"];return["强","#e67e22"]; }
        function gUmb(p,c){ const r=[51,53,55,61,63,65,80,81,82,95,96,99];if(r.includes(c)||p>50)return["☂️","#e74c3c"];if(p>30)return["🌂","#f39c12"];return["☔","#27ae60"]; }
        function gClo(t,r){ if(r)return"🌂带雨具";if(t>30)return"👕轻薄";if(t>25)return"👔短袖";if(t>20)return"🧥薄外套";return"🧥厚外套"; }

        function renderNews(el, list, cat) {
            if(!list.length) { el.innerHTML='<div style="padding:16px;text-align:center;color:#999;font-size:12px">暂无新闻</div>'; return; }
            el.innerHTML = list.map((n,i) => {
                let t = '';
                if(n.time) { try { const d=new Date(n.time); if(!isNaN(d)) t=`${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`; } catch(e){} }
                const id = btoa(unescape(encodeURIComponent(n.title))).replace(/=/g,'');
                return `<div class="news-item" onclick="openNews('${cat}','${id}','${encodeURIComponent(n.title)}','${encodeURIComponent(n.link||'#')}','${encodeURIComponent(t)}','${encodeURIComponent(n.desc||'')}')" style="animation:fadeIn 0.3s ease ${i*0.02}s both">
                    <div class="news-item-title">${n.title.replace(/</g,'&lt;')}</div>
                    ${t?`<div class="news-item-time">🕐 ${t}</div>`:''}
                </div>`;
            }).join('');
        }

        function openNews(cat, id, title, link, time, desc) {
            title = decodeURIComponent(title);
            link = decodeURIComponent(link);
            time = decodeURIComponent(time);
            desc = decodeURIComponent(desc);
            const catNames = {cn:'国内外新闻',hot:'热搜信息',sports:'体育新闻',tech:'科技新闻'};
            const sources = {cn:'中新网',hot:'中新网',sports:'中新网体育/BBC',tech:'IT之家/36氪'};
            const html = `<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>${title} - shma.top</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Noto Sans SC',sans-serif;background:#f8f9fa;min-height:100vh;padding:20px;color:#202124}
.container{max-width:800px;margin:0 auto}.back{display:inline-block;padding:8px 16px;background:#4285F4;color:white;text-decoration:none;border-radius:8px;font-size:14px;margin-bottom:16px}
.back:hover{background:#3367D6}.header{background:white;border-radius:16px;padding:24px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,0.06)}
.header h1{font-size:22px;color:#1a73e8;margin-bottom:8px;line-height:1.4}.meta{font-size:13px;color:#5f6368}
.content{background:white;border-radius:16px;padding:24px;box-shadow:0 2px 8px rgba(0,0,0,0.06)}
.content p{font-size:15px;line-height:1.8;color:#333;margin-bottom:16px}.link{margin-top:16px}.link a{color:#1a73e8;text-decoration:none;font-size:14px}
.link a:hover{text-decoration:underline}.footer{margin-top:20px;padding:16px;background:white;border-radius:12px;text-align:center;font-size:12px;color:#999;box-shadow:0 2px 8px rgba(0,0,0,0.06)}</style>
</head><body><div class="container">
<a href="/" class="back">← 返回首页</a>
<div class="header"><h1>${title}</h1><div class="meta">📅 ${time} | 分类：${catNames[cat]} | 来源：${sources[cat]}</div></div>
<div class="content"><p>${desc||'暂无详细内容'}</p><div class="link"><a href="${link}" target="_blank">📰 查看原文 →</a></div></div>
<div class="footer">本信息来自 ${sources[cat]}，更新时间：${new Date().toLocaleString('zh-CN')}<br>© shma.top 天气与新闻</div>
</div></body></html>`;
            const w = window.open('', '_blank');
            w.document.write(html);
            w.document.close();
        }

        renderNews(document.getElementById('cnNews'), CN_NEWS, 'cn');
        renderNews(document.getElementById('hotNews'), HOT_NEWS, 'hot');
        renderNews(document.getElementById('sportsNews'), SPORTS_NEWS, 'sports');
        renderNews(document.getElementById('techNews'), TECH_NEWS, 'tech');

        let calYear = new Date().getFullYear();
        let calMonth = new Date().getMonth();
        function renderCalendar() {
            const grid = document.getElementById('calGrid');
            const monthEl = document.getElementById('calMonth');
            const months = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
            monthEl.textContent = `${calYear}年${months[calMonth]}`;
            const firstDay = new Date(calYear, calMonth, 1).getDay();
            const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
            const today = new Date();
            let html = ['日','一','二','三','四','五','六'].map(d => `<div class="cal-week">${d}</div>`).join('');
            for(let i=0; i<firstDay; i++) html += '<div class="cal-day empty"></div>';
            for(let d=1; d<=daysInMonth; d++) {
                const dateStr = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const isToday = today.getFullYear()===calYear && today.getMonth()===calMonth && today.getDate()===d;
                const hasNews = NEWS_DATES.includes(dateStr);
                let cls = 'cal-day';
                if(isToday) cls += ' today';
                else if(hasNews) cls += ' has-news';
                html += `<div class="${cls}" ${hasNews&&!isToday?`onclick="window.open('/news/?date=${dateStr}','_blank')"`:''}>${d}</div>`;
            }
            grid.innerHTML = html;
        }
        function changeMonth(delta) { calMonth+=delta; if(calMonth>11){calMonth=0;calYear++} if(calMonth<0){calMonth=11;calYear--} renderCalendar(); }
        renderCalendar();

        async function loadWeather(city) {
            const el = document.getElementById('weatherContent');
            el.innerHTML = '<div style="text-align:center;padding:16px"><div class="spinner"></div><div style="color:#999;font-size:12px">加载中...</div></div>';
            try {
                const g = await (await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1&language=zh`)).json();
                if(!g.results||!g.results.length) { el.innerHTML='<div style="padding:16px;text-align:center;color:#e74c3c;font-size:12px">未找到城市</div>'; return; }
                const geo=g.results[0];
                const w = await (await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${geo.latitude}&longitude=${geo.longitude}&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m,wind_direction_10m,uv_index&daily=temperature_2m_max,temperature_2m_min,weather_code,precipitation_probability_max&timezone=auto&forecast_days=7`)).json();
                const c=w.current, code=c.weather_code, icon=WI[code]||"🌤️", desc=WD[code]||"未知";
                const rc=[51,53,55,61,63,65,80,81,82,95,96,99];
                const uv=gUV(c.uv_index), umb=gUmb(0,code), cloth=gClo(c.temperature_2m,rc.includes(code));
                const wk=["日","一","二","三","四","五","六"];
                let forecastHTML='';
                for(let i=0;i<7;i++){ const d=new Date(w.daily.time[i]); const dayCode=w.daily.weather_code[i]; forecastHTML+=`<div class="day-card"><div class="day-date">${w.daily.time[i].slice(5)} 周${wk[d.getDay()]}</div><div class="day-icon">${WI[dayCode]||"🌤️"}</div><div class="day-temp">${w.daily.temperature_2m_min[i]}~${w.daily.temperature_2m_max[i]}°</div></div>`; }
                el.innerHTML=`<div class="wc-city">📍 ${geo.name}</div><div class="wc-main"><div class="wc-icon">${icon}</div><div><div class="wc-temp">${Math.round(c.temperature_2m)}°C</div><div class="wc-desc">${desc} · 体感${Math.round(c.apparent_temperature)}°</div></div></div><div class="wc-info"><div class="wc-info-item"><div class="wc-info-label">💧 湿度</div><div class="wc-info-value">${c.relative_humidity_2m}%</div></div><div class="wc-info-item"><div class="wc-info-label">💨 风速</div><div class="wc-info-value">${gDir(c.wind_direction_10m)}${gWL(c.wind_speed_10m)}</div></div><div class="wc-info-item"><div class="wc-info-label">☀️ 紫外线</div><div class="wc-info-value" style="color:${uv[1]}">${uv[0]}</div></div><div class="wc-info-item"><div class="wc-info-label">🌧️ 降雨</div><div class="wc-info-value">${w.daily.precipitation_probability_max[0]}%</div></div></div><div class="wc-tips"><div class="wc-tip" style="background:${umb[1]};color:#fff">${umb[0]}</div><div class="wc-tip" style="background:#4285F4;color:#fff">${cloth}</div></div><div class="forecast"><div class="forecast-title">📅 未来7天</div><div class="forecast-grid">${forecastHTML}</div></div>`;
            } catch(e) { el.innerHTML=`<div style="padding:16px;text-align:center;color:#e74c3c;font-size:12px">获取失败</div>`; }
        }

        function searchCity() { const v=document.getElementById('searchInput').value.trim(); if(v){ document.getElementById('citySelect').value=''; loadWeather(v); } }

        function updateDT() {
            const now=new Date();
            const h=String(now.getHours()).padStart(2,'0'), m=String(now.getMinutes()).padStart(2,'0'), s=String(now.getSeconds()).padStart(2,'0');
            const wk=["星期日","星期一","星期二","星期三","星期四","星期五","星期六"];
            const st={"0105":"小寒","0120":"大寒","0203":"立春","0218":"雨水","0305":"惊蛰","0320":"春分","0404":"清明","0420":"谷雨","0505":"立夏","0521":"小满","0605":"芒种","0621":"夏至","0707":"小暑","0722":"大暑","0807":"立秋","0823":"处暑","0907":"白露","0923":"秋分","1008":"寒露","1023":"霜降","1107":"立冬","1122":"小雪","1207":"大雪","1222":"冬至"};
            const te={"小寒":"❄️","大寒":"❄️","立春":"🌱","雨水":"🌧️","惊蛰":"🐛","春分":"🌸","清明":"🌿","谷雨":"🌾","立夏":"☀️","小满":"🌾","芒种":"🌾","夏至":"🌞","小暑":"🔥","大暑":"🔥","立秋":"🍂","处暑":"🍃","白露":"💧","秋分":"🍁","寒露":"💧","霜降":"🌫️","立冬":"❄️","小雪":"🌨️","大雪":"❄️","冬至":"🥟"};
            const key=String(now.getMonth()+1).padStart(2,'0')+String(now.getDate()).padStart(2,'0');
            const term=st[key];
            const lunar=term?`${te[term]} ${term}`:`${["正月","二月","三月","四月","五月","六月","七月","八月","九月","十月","冬月","腊月"][(now.getMonth()+2)%12]}${["初一","初二","初三","初四","初五","初六","初七","初八","初九","初十","十一","十二","十三","十四","十五","十六","十七","十八","十九","二十","廿一","廿二","廿三","廿四","廿五","廿六","廿七","廿八","廿九","三十"][(now.getDate()-1)%30]}`;
            document.getElementById('dtTime').textContent=`${h}:${m}:${s}`;
            document.getElementById('dtDate').textContent=`${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日`;
            document.getElementById('dtWeekday').textContent=wk[now.getDay()];
            document.getElementById('dtLunar').textContent=lunar;
        }
        setInterval(updateDT,1000); updateDT();
        loadWeather('上海');
    </script>
</body>
</html>
