<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>天气与新闻</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(180deg, #e8f0fe 0%, #f0f7ff 50%, #ffffff 100%);
            min-height: 100vh;
            padding: 16px;
            color: #202124;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .layout { display: grid; grid-template-columns: 1fr 320px; gap: 20px; }

        .col { display: flex; flex-direction: column; gap: 20px; }
        .news-panel {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(66,133,244,0.08), 0 2px 12px rgba(0,0,0,0.04);
            border: 1px solid rgba(66,133,244,0.08);
        }
        .news-header {
            padding: 12px 16px;
            background: linear-gradient(135deg, #4285F4, #34A853);
            color: white;
            font-size: 15px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .news-header.football { background: linear-gradient(135deg, #1a73e8, #4285F4); }
        .news-header.basketball { background: linear-gradient(135deg, #ea4335, #fbbc05); }
        .news-list { padding: 4px 0; max-height: 280px; overflow-y: auto; }
        .news-item {
            padding: 8px 14px;
            border-bottom: 1px solid #f1f3f4;
            transition: all 0.2s ease;
            cursor: pointer;
        }
        .news-item:hover { background: #f8f9fa; padding-left: 18px; }
        .news-item:last-child { border-bottom: none; }
        .news-item-title { font-size: 13px; font-weight: 500; color: #202124; line-height: 1.5; }
        .news-item-time { font-size: 11px; color: #999; margin-top: 2px; }
        .news-list::-webkit-scrollbar { width: 4px; }
        .news-list::-webkit-scrollbar-track { background: transparent; }
        .news-list::-webkit-scrollbar-thumb { background: #dadce0; border-radius: 2px; }

        .wc-section {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(66,133,244,0.08);
            border: 1px solid rgba(66,133,244,0.08);
            margin-top: 20px;
        }
        .wc-header {
            padding: 12px 16px;
            background: linear-gradient(135deg, #1a73e8, #ea4335);
            color: white;
            font-size: 15px;
            font-weight: 700;
        }
        .wc-matches { padding: 12px; display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 10px; }
        .wc-match {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 14px;
            background: #f8f9fa;
            border-radius: 10px;
            font-size: 13px;
            transition: all 0.2s ease;
        }
        .wc-match:hover { background: #e8f0fe; transform: translateY(-1px); }
        .wc-teams { font-weight: 600; color: #202124; }
        .wc-score { color: #1a73e8; font-weight: 700; font-size: 14px; }
        .wc-date { color: #999; font-size: 11px; }

        .right-panel { display: flex; flex-direction: column; gap: 16px; }
        .datetime-card {
            background: white;
            border-radius: 16px;
            padding: 18px;
            box-shadow: 0 2px 8px rgba(66,133,244,0.08);
            border: 1px solid rgba(66,133,244,0.08);
        }
        .dt-time { font-size: 32px; font-weight: 700; color: #1a73e8; text-align: center; font-variant-numeric: tabular-nums; }
        .dt-date { text-align: center; color: #5f6368; font-size: 14px; margin-top: 6px; }
        .dt-row { display: flex; gap: 8px; margin-top: 10px; justify-content: center; flex-wrap: wrap; }
        .dt-tag { padding: 4px 10px; border-radius: 10px; font-size: 12px; font-weight: 500; }
        .dt-weekday { background: #e8f0fe; color: #1a73e8; }
        .dt-lunar { background: linear-gradient(135deg, #4285F4, #34A853); color: white; }

        .search-card {
            background: white;
            border-radius: 16px;
            padding: 14px;
            box-shadow: 0 2px 8px rgba(66,133,244,0.08);
            border: 1px solid rgba(66,133,244,0.08);
        }
        .search-row { display: flex; gap: 8px; }
        .city-select {
            flex: 1;
            padding: 8px 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 13px;
            font-family: inherit;
            background: white;
            cursor: pointer;
            outline: none;
        }
        .city-select:focus { border-color: #4285F4; }
        .search-input {
            flex: 1;
            padding: 8px 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 13px;
            font-family: inherit;
            outline: none;
        }
        .search-input:focus { border-color: #4285F4; }
        .search-btn {
            padding: 8px 16px;
            background: linear-gradient(135deg, #4285F4, #34A853);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            white-space: nowrap;
        }

        .weather-card {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(66,133,244,0.08);
            border: 1px solid rgba(66,133,244,0.08);
        }
        .weather-header {
            padding: 12px 16px;
            background: linear-gradient(135deg, #4285F4, #34A853);
            color: white;
            font-size: 15px;
            font-weight: 700;
        }
        .weather-body { padding: 16px; }
        .wc-city { font-size: 18px; font-weight: 700; color: #202124; margin-bottom: 8px; text-align: center; }
        .wc-main { display: flex; align-items: center; gap: 16px; margin-bottom: 12px; justify-content: center; }
        .wc-icon { font-size: 64px; animation: pulse 2s ease-in-out infinite; }
        @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        .wc-temp { font-size: 40px; font-weight: 700; color: #1a73e8; }
        .wc-desc { font-size: 15px; color: #5f6368; }
        .wc-info { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
        .wc-info-item { padding: 8px; background: #f8f9fa; border-radius: 8px; text-align: center; }
        .wc-info-label { font-size: 11px; color: #999; }
        .wc-info-value { font-size: 14px; font-weight: 600; color: #202124; }
        .wc-tips { display: flex; gap: 6px; flex-wrap: wrap; }
        .wc-tip { padding: 5px 10px; border-radius: 12px; font-size: 11px; font-weight: 500; }

        .forecast { margin-top: 12px; }
        .forecast-title { font-size: 14px; font-weight: 700; color: #1a73e8; margin-bottom: 10px; }
        .forecast-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
        .day-card {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 8px 4px;
            text-align: center;
            transition: all 0.2s ease;
        }
        .day-card:hover { transform: translateY(-2px); box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .day-date { font-size: 10px; color: #999; }
        .day-icon { font-size: 28px; margin: 4px 0; }
        .day-temp { font-size: 12px; font-weight: 700; color: #202124; }

        .spinner { width: 28px; height: 28px; border: 3px solid #e0e0e0; border-top-color: #4285F4; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 8px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        @media (max-width: 1000px) {
            .layout { grid-template-columns: 1fr; }
            .right-panel { flex-direction: row; flex-wrap: wrap; }
            .right-panel > * { flex: 1; min-width: 280px; }
            .news-list { max-height: 250px; }
        }
        @media (max-width: 700px) {
            .col { gap: 16px; }
            .right-panel { flex-direction: column; }
            .right-panel > * { min-width: auto; }
            .wc-icon { font-size: 72px; }
            .wc-temp { font-size: 44px; }
            .wc-matches { grid-template-columns: 1fr; }
        }
    </style>
</head>

://www.espn.com/nba/story/_/id/48957095/2026-nba-free-agency-grades-offseason-signings-deals-contracts-extensions-depth-charts", "time": "Thu, 25 Jun 2026 15:41:00 EST"}, {"title": "NBA trade tracker: Thunder send Aaron Wiggins to H...", "link": "https://www.espn.com/nba/story/_/id/48957844/nba-trade-tracker-details-every-deal-2026-offseason-draft-free-agency", "time": "Thu, 25 Jun 2026 15:41:00 EST"}, {"title": "Copy of Stephen Curry responds to Yaxel Lendeborg's 'used ...", "link": "https://www.espn.com/nba/story/_/id/49176705/stephen-curry-yaxel-lendeborg-golden-state-warriors-joke", "time": "Thu, 25 Jun 2026 14:21:28 EST"}];
        const WC_MATCHES = [{"date": "06-26", "home": "Paraguay", "away": "Australia", "score": "VS", "time": "02:00"}, {"date": "06-26", "home": "Norway", "away": "France", "score": "VS", "time": "19:00"}, {"date": "06-25", "home": "South Africa", "away": "South Korea", "score": "VS", "time": "01:00"}, {"date": "06-25", "home": "Curaçao", "away": "Ivory Coast", "score": "VS", "time": "20:00"}, {"date": "06-25", "home": "Ecuador", "away": "Germany", "score": "VS", "time": "20:00"}, {"date": "06-24", "home": "Morocco", "away": "Haiti", "score": "VS", "time": "22:00"}, {"date": "06-24", "home": "Scotland", "away": "Brazil", "score": "VS", "time": "22:00"}, {"date": "06-24", "home": "Switzerland", "away": "Canada", "score": "VS", "time": "19:00"}];

        const WI = {0:"☀️",1:"🌤️",2:"⛅",3:"☁️",45:"🌫️",48:"🌫️",51:"🌦️",53:"🌦️",55:"🌧️",61:"🌧️",63:"🌧️",65:"🌧️",71:"🌨️",73:"🌨️",75:"❄️",80:"🌧️",81:"🌧️",82:"🌧️",95:"⛈️",96:"⛈️",99:"⛈️"};
        const WD = {0:"晴",1:"大部晴",2:"多云",3:"阴天",45:"雾",51:"小毛毛雨",53:"毛毛雨",55:"大毛毛雨",61:"小雨",63:"中雨",65:"大雨",71:"小雪",73:"中雪",75:"大雪",80:"小阵雨",81:"中阵雨",82:"大阵雨",95:"雷暴",96:"雷暴冰雹",99:"强雷暴冰雹"};
        const wDirs=["北","东北","东","东南","南","西南","西","西北"];
        function gDir(d){ return wDirs[Math.round(d/45)%8]+"风"; }
        function gWL(s){ if(s<6)return"软风";if(s<12)return"轻风";if(s<20)return"微风";if(s<29)return"和风";return"清风"; }
        function gUV(u){ if(u<=2)return["弱","#27ae60"];if(u<=5)return["中","#f39c12"];return["强","#e67e22"]; }
        function gUmb(p,c){ const r=[51,53,55,61,63,65,80,81,82,95,96,99];if(r.includes(c)||p>50)return["☂️","#e74c3c"];if(p>30)return["🌂","#f39c12"];return["☔","#27ae60"]; }
        function gClo(t,r){ if(r)return"🌂带雨具";if(t>30)return"👕轻薄";if(t>25)return"👔短袖";if(t>20)return"🧥薄外套";return"🧥厚外套"; }

        function renderNews(el, list) {
            if(!list.length) { el.innerHTML='<div style="padding:20px;text-align:center;color:#999;font-size:13px">暂无新闻</div>'; return; }
            el.innerHTML = list.map((n,i) => {
                let t = '';
                if(n.time) { try { const d=new Date(n.time); if(!isNaN(d)) t=`${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`; } catch(e){} }
                return `<div class="news-item" style="animation:fadeIn 0.3s ease ${i*0.02}s both" onclick="window.open('${(n.link||'#').replace(/"/g,'&quot;')}','_blank')">
                    <div class="news-item-title">${n.title.replace(/</g,'&lt;')}</div>
                    ${t?`<div class="news-item-time">🕐 ${t}</div>`:''}
                </div>`;
            }).join('');
        }
        renderNews(document.getElementById('cnNews'), CN_NEWS);
        renderNews(document.getElementById('worldNews'), WORLD_NEWS);
        renderNews(document.getElementById('footballNews'), FOOTBALL_NEWS);
        renderNews(document.getElementById('basketballNews'), BASKETBALL_NEWS);

        function renderWC(matches) {
            const el = document.getElementById('wcMatches');
            if(!matches.length) { el.innerHTML='<div style="padding:20px;text-align:center;color:#999;font-size:13px">暂无比赛数据</div>'; return; }
            el.innerHTML = matches.map((m,i) => `
                <div class="wc-match" style="animation:fadeIn 0.3s ease ${i*0.05}s both">
                    <div class="wc-date">${m.date} ${m.time}</div>
                    <div class="wc-teams">${m.home} vs ${m.away}</div>
                    <div class="wc-score">${m.score}</div>
                </div>
            `).join('');
        }
        renderWC(WC_MATCHES);

        async function loadWeather(city) {
            const el = document.getElementById('weatherContent');
            el.innerHTML = '<div style="text-align:center;padding:20px"><div class="spinner"></div><div style="color:#999;font-size:13px">加载中...</div></div>';
            try {
                const g = await (await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1&language=zh`)).json();
                if(!g.results||!g.results.length) { el.innerHTML='<div style="padding:20px;text-align:center;color:#e74c3c;font-size:13px">未找到城市</div>'; return; }
                const geo=g.results[0];
                const w = await (await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${geo.latitude}&longitude=${geo.longitude}&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m,wind_direction_10m,uv_index&daily=temperature_2m_max,temperature_2m_min,weather_code,precipitation_probability_max&timezone=auto&forecast_days=7`)).json();
                const c=w.current, code=c.weather_code, icon=WI[code]||"🌤️", desc=WD[code]||"未知";
                const rc=[51,53,55,61,63,65,80,81,82,95,96,99];
                const uv=gUV(c.uv_index), umb=gUmb(0,code), cloth=gClo(c.temperature_2m,rc.includes(code));
                const wk=["日","一","二","三","四","五","六"];

                let forecastHTML='';
                for(let i=0;i<7;i++){
                    const d=new Date(w.daily.time[i]);
                    const dayCode=w.daily.weather_code[i];
                    forecastHTML+=`<div class="day-card">
                        <div class="day-date">${w.daily.time[i].slice(5)} 周${wk[d.getDay()]}</div>
                        <div class="day-icon">${WI[dayCode]||"🌤️"}</div>
                        <div class="day-temp">${w.daily.temperature_2m_min[i]}~${w.daily.temperature_2m_max[i]}°</div>
                    </div>`;
                }

                el.innerHTML=`
                    <div class="wc-city">📍 ${geo.name}</div>
                    <div class="wc-main">
                        <div class="wc-icon">${icon}</div>
                        <div><div class="wc-temp">${Math.round(c.temperature_2m)}°C</div><div class="wc-desc">${desc} · 体感${Math.round(c.apparent_temperature)}°</div></div>
                    </div>
                    <div class="wc-info">
                        <div class="wc-info-item"><div class="wc-info-label">💧 湿度</div><div class="wc-info-value">${c.relative_humidity_2m}%</div></div>
                        <div class="wc-info-item"><div class="wc-info-label">💨 风速</div><div class="wc-info-value">${gDir(c.wind_direction_10m)}${gWL(c.wind_speed_10m)}</div></div>
                        <div class="wc-info-item"><div class="wc-info-label">☀️ 紫外线</div><div class="wc-info-value" style="color:${uv[1]}">${uv[0]}</div></div>
                        <div class="wc-info-item"><div class="wc-info-label">🌧️ 降雨</div><div class="wc-info-value">${w.daily.precipitation_probability_max[0]}%</div></div>
                    </div>
                    <div class="wc-tips">
                        <div class="wc-tip" style="background:${umb[1]};color:#fff">${umb[0]}</div>
                        <div class="wc-tip" style="background:#4285F4;color:#fff">${cloth}</div>
                    </div>
                    <div class="forecast">
                        <div class="forecast-title">📅 未来7天</div>
                        <div class="forecast-grid">${forecastHTML}</div>
                    </div>`;
            } catch(e) { el.innerHTML=`<div style="padding:20px;text-align:center;color:#e74c3c;font-size:13px">获取失败</div>`; }
        }

        function searchCity() {
            const v=document.getElementById('searchInput').value.trim();
            if(v){ document.getElementById('citySelect').value=''; loadWeather(v); }
        }

        function updateDT() {
            const now=new Date();
            const h=String(now.getHours()).padStart(2,'0'), m=String(now.getMinutes()).padStart(2,'0'), s=String(now.getSeconds()).padStart(2,'0');
            const wk=["星期日","星期一","星期二","星期三","星期四","星期五","星期六"];
            const st={"0105":"小寒","0120":"大寒","0203":"立春","0218":"雨水","0305":"惊蛰","0320":"春分","0404":"清明","0420":"谷雨","0505":"立夏","0521":"小满","0605":"芒种","0621":"夏至","0707":"小暑","0722":"大暑","0807":"立秋","0823":"处暑","0907":"白露","0923":"秋分","1008":"寒露","1023":"霜降","1107":"立冬","1122":"小雪","1207":"大雪","1222":"冬至"};
            const te={"小寒":"❄️","大寒":"❄️","立春":"🌱","雨水":"🌧️","惊蛰":"🐛","春分":"🌸","清明":"🌿","谷雨":"🌾","立夏":"☀️","小满":"🌾","芒种":"🌾","夏至":"🌞","小暑":"🔥","大暑":"🔥","立秋":"🍂","处暑":"🍃","白露":"💧","秋分":"🍁","寒露":"💧","霜降":"🌫️","立冬":"❄️","小雪":"🌨️","大雪":"❄️","冬至":"🥟"};
            const key=String(now.getMonth()+1).padStart(2,'0')+String(now.getDate()).padStart(2,'0');
            const term=st[key];
            const lunar=term?`${te[term]} ${term}`:`${["正月","二月","三月","四月","五月","六月","七月","八月","九月","十月","冬月","腊月"][(now.getMonth()+2)%12]}${["初一","初二","初三","初四","初五","初六","初七","初八","初九","初十","十一","十二","十三","十四","十五","十六","十七","十八","十九","二十","廿一","廿二","廿三","廿四","廿五","廿六","廿七","廿八","廿九","三十"][(now.getDate()-1)%30]}`;
            document.getElementById('dtTime').textContent=`${h}:${m}:${s}`;
            document.getElementById('dtDate').textContent=`${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日`;
            document.getElementById('dtWeekday').textContent=wk[now.getDay()];
            document.getElementById('dtLunar').textContent=lunar;
        }
        setInterval(updateDT,1000); updateDT();
        loadWeather('上海');
    </script>
